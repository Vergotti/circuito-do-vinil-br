<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuito do Vinil BR — Mapa de Lojas</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .count-badge { font-family: 'Space Mono', monospace; font-size: 9px; color: #555; letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .count-badge span { color: #d94747; }

  .controls {
    padding: 8px 16px; background: #0e0e0e; border-bottom: 1px solid #1f1f1f;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .search-input {
    flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; color: #F2F2EE;
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: .06em;
    padding: 7px 12px; outline: none; max-width: 320px;
  }
  .search-input::placeholder { color: #666; }
  .search-input:focus { border-color: #d94747; }
  .btn-geo {
    background: #d94747; border: none; color: #111; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 8px 14px; white-space: nowrap; flex-shrink: 0;
    transition: background .15s;
  }
  .btn-geo:hover { background: #c23d3d; }

  .mapa-wrap { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; height: 100%; }

  #sidebar {
    width: 280px; flex-shrink: 0; background: #111;
    border-left: 1px solid #1f1f1f;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 14px; border-bottom: 1px solid #1f1f1f; flex-shrink: 0;
    font-family: 'Space Mono', monospace; font-size: 8px;
    letter-spacing: .1em; text-transform: uppercase; color: #444;
  }
  .lista-lojas { flex: 1; overflow-y: auto; }
  .lista-lojas::-webkit-scrollbar { width: 4px; }
  .lista-lojas::-webkit-scrollbar-thumb { background: #2a2a2a; }

  .item-loja {
    padding: 11px 14px; border-bottom: 1px solid #171717;
    cursor: pointer; transition: background .12s;
    border-left: 3px solid transparent;
  }
  .item-loja:hover { background: #1a1a1a; }
  .item-loja.ativo { background: #1f1415; border-left-color: #d94747; }
  .item-nome { font-family: 'Anton', sans-serif; font-size: 14px; color: #F2F2EE; line-height: 1; margin-bottom: 3px; }
  .item-cidade { font-family: 'Space Mono', monospace; font-size: 8px; color: #555; text-transform: uppercase; letter-spacing: .06em; }
  .item-dist { font-family: 'Space Mono', monospace; font-size: 8px; color: #d94747; margin-top: 2px; }
  .loading-msg { padding: 20px 14px; font-family: 'Space Mono', monospace; font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: .08em; }

  .leaflet-popup-content-wrapper { background: #1a1a1a; border: 1px solid #d94747; border-radius: 0; box-shadow: 0 4px 20px rgba(0,0,0,.8); }
  .leaflet-popup-tip { background: #d94747; }
  .leaflet-popup-content { margin: 0; }
  .popup-body { padding: 14px 16px; min-width: 220px; }
  .popup-nome { font-family: 'Anton', sans-serif; font-size: 18px; color: #F2F2EE; line-height: 1; margin-bottom: 4px; }
  .popup-cidade { font-family: 'Space Mono', monospace; font-size: 8px; color: #d94747; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .popup-end { font-family: 'DM Sans', sans-serif; font-size: 12px; color: #888; margin-bottom: 8px; line-height: 1.4; }
  .popup-ig { display: inline-block; font-family: 'Space Mono', monospace; font-size: 9px; color: #d94747; text-decoration: none; border: 1px solid #d94747; padding: 3px 8px; margin-bottom: 8px; }
  .popup-ig:hover { background: #d94747; color: #111; }
  .popup-rota { display: block; font-family: 'Space Mono', monospace; font-size: 9px; color: #555; text-decoration: none; letter-spacing: .06em; text-transform: uppercase; }
  .popup-rota:hover { color: #F2F2EE; }

  @media(max-width: 768px) {
    #sidebar { display: none; }
    .search-input { max-width: 100%; }
  }
</style>
</head>
<body>

    <div class="brand-sub">Mapa de Lojas de Vinil &nbsp;·&nbsp; Brasil</div>
  </div>
  <div class="count-badge">Lojas: <span id="count">0</span></div>
</div>

<div class="controls">
  <input class="search-input" type="text" id="search" placeholder="Buscar loja ou cidade..." oninput="filtrar()">
  <span class="count-badge">Lojas: <span id="count">0</span></span>
  <button class="btn-geo" onclick="geoLocalizar()"><strong>Perto de mim</strong></button>
</div>

<div class="mapa-wrap">
  <div id="map"></div>
  <div id="sidebar">
    <div class="sidebar-header">Lojas encontradas</div>
    <div class="lista-lojas" id="lista-lojas">
      <div class="loading-msg">Carregando...</div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1VyMWhTtBnavYv4J2kwAAbvV9psNHbLvWdddoJ2cn5vE';
const SHEET_LOJAS = 'Lojas';
const COL = { nome:0, estado:1, cidade:2, endereco:3, bairro:4, instagram:5, obs:6, lat:7, lng:8 };

const map = L.map('map').setView([-15.78, -47.93], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19
}).addTo(map);

const icone = L.divIcon({
  className: '',
  html: '<div style="width:10px;height:10px;background:#d94747;border-radius:50%;border:2px solid #F2F2EE;box-shadow:0 0 6px rgba(217,71,71,.6);"></div>',
  iconSize: [10,10], iconAnchor: [5,5], popupAnchor: [0,-8]
});

let lojas = [], marcadores = [], listaAtual = [], userMarker = null;

function criarPopup(l) {
  const ig = l.instagram ? l.instagram.replace('@','') : '';
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(l.endereco+', '+l.cidade)}`;
  return `<div class="popup-body">
    <div class="popup-nome">${l.nome}</div>
    <div class="popup-cidade">${l.cidade} &nbsp;·&nbsp; ${l.estado}</div>
    <div class="popup-end">${l.endereco}${l.bairro?' — '+l.bairro:''}</div>
    ${ig?`<a class="popup-ig" href="https://instagram.com/${ig}" target="_blank">${l.instagram}</a>`:''}
    <a class="popup-rota" href="${mapsUrl}" target="_blank">↗ Como chegar</a>
  </div>`;
}

function renderizar(lista) {
  listaAtual = lista;
  marcadores.forEach(m => map.removeLayer(m));
  marcadores = [];
  lista.forEach((l,i) => {
    const m = L.marker([l.lat,l.lng],{icon:icone}).addTo(map)
      .bindPopup(criarPopup(l),{maxWidth:300,minWidth:240});
    m.on('click', () => destacarItem(i));
    marcadores.push(m);
  });
  document.getElementById('count').textContent = lista.length;
  renderLista(lista);
}

function renderLista(lista) {
  const el = document.getElementById('lista-lojas');
  if (!lista.length) { el.innerHTML='<div class="loading-msg">Nenhuma loja encontrada.</div>'; return; }
  el.innerHTML = lista.map((l,i) => `
    <div class="item-loja" id="item-${i}" onclick="clicarItem(${i})">
      <div class="item-nome">${l.nome}</div>
      <div class="item-cidade">${l.cidade} · ${l.estado}</div>
      ${l._dist!==undefined?`<div class="item-dist">${l._dist} km</div>`:''}
    </div>`).join('');
}

function clicarItem(i) {
  map.setView([listaAtual[i].lat, listaAtual[i].lng], 17);
  marcadores[i].openPopup();
  destacarItem(i);
}

function destacarItem(i) {
  document.querySelectorAll('.item-loja').forEach(el => el.classList.remove('ativo'));
  const el = document.getElementById('item-'+i);
  if (el) { el.classList.add('ativo'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
}

function filtrar() {
  const q = document.getElementById('search').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  renderizar(lojas.filter(l => (l.nome+l.cidade+l.estado+l.bairro).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q)));
}

function geoLocalizar() {
  if (!navigator.geolocation) { alert('Geolocalização não disponível.'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude:lat, longitude:lng} = pos.coords;
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([lat,lng],{radius:8,color:'#F2F2EE',fillColor:'#d94747',fillOpacity:.8,weight:2})
      .addTo(map).bindPopup('<div style="font-family:Space Mono,monospace;font-size:10px;color:#F2F2EE;background:#1a1a1a;padding:8px;">Você está aqui</div>').openPopup();
    const comDist = lojas.map(l => {
      const d = Math.sqrt(Math.pow((l.lat-lat)*111,2)+Math.pow((l.lng-lng)*111*Math.cos(lat*Math.PI/180),2));
      return {...l, _dist:d.toFixed(1)};
    }).sort((a,b) => a._dist-b._dist);
    renderizar(comDist);
    map.setView([lat,lng],13);
  }, err => alert(err.code===1?'Permissão negada. Libere a localização no navegador.':'Não foi possível obter sua localização.'));
}

async function carregarLojas() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_LOJAS)}&t=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^.*?({.*}).*$/s,'$1'));
    const skip = json.table.parsedNumHeaders > 0 ? 1 : 0;
    lojas = json.table.rows.slice(skip)
      .map(row => row.c.map(cell => (cell&&cell.v!==null)?String(cell.v).trim():''))
      .filter(row => row[COL.nome] && row[COL.nome] !== 'Nome')
      .filter(row => {
        const lat = parseFloat(String(row[COL.lat]).replace(',','.'));
        const lng = parseFloat(String(row[COL.lng]).replace(',','.'));
        return !isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0;
      })
      .map(row => ({
        nome: row[COL.nome], estado: row[COL.estado], cidade: row[COL.cidade],
        endereco: row[COL.endereco], bairro: row[COL.bairro], instagram: row[COL.instagram],
        lat: parseFloat(String(row[COL.lat]).replace(',','.')),
        lng: parseFloat(String(row[COL.lng]).replace(',','.'))
      }));
    renderizar(lojas);
  } catch(e) {
    console.error('Erro:', e);
    document.getElementById('lista-lojas').innerHTML='<div class="loading-msg">Erro ao carregar lojas.</div>';
  }
}

carregarLojas();
</script>
</body>
</html>

const outrosEstados = ["CE","BA","PE","SE","PA","GO","MT","SC","RS"];
let estadoAtivo = "todos";
let marcadores = [];

const icone = L.divIcon({
  className: '',
  html: '<div class="marker-custom"></div>',
  iconSize: [12, 12],
  iconAnchor: [6, 6],
  popupAnchor: [0, -8]
});

const map = L.map('map', {
  center: [-15.7801, -47.9292],
  zoom: 5,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

function criarPopup(l) {
  const ig = l.instagram.replace('@','');
  return `<div class="popup-body">
    <div class="popup-nome">${l.nome}</div>
    <div class="popup-cidade">${l.cidade} &nbsp;·&nbsp; ${l.estado}</div>
    <div class="popup-end">${l.endereco}${l.bairro ? ' — ' + l.bairro : ''}</div>
    <a class="popup-ig" href="https://instagram.com/${ig}" target="_blank">${l.instagram}</a>
  </div>`;
}

function renderizar(lista) {
  marcadores.forEach(m => map.removeLayer(m));
  marcadores = [];
  lista.forEach(l => {
    const m = L.marker([l.lat, l.lng], {icon: icone})
      .addTo(map)
      .bindPopup(criarPopup(l), {maxWidth: 280, minWidth: 240});
    marcadores.push(m);
  });
  document.getElementById('count').textContent = lista.length + ' loja' + (lista.length !== 1 ? 's' : '');
}

function filtrar() {
  const q = document.getElementById('search').value.toLowerCase();
  let lista = lojas;
  if (estadoAtivo !== 'todos') {
    if (estadoAtivo === 'outros') {
      lista = lista.filter(l => outrosEstados.includes(l.estado));
    } else {
      lista = lista.filter(l => l.estado === estadoAtivo);
    }
  }
  if (q) {
    lista = lista.filter(l =>
      l.nome.toLowerCase().includes(q) ||
      l.cidade.toLowerCase().includes(q) ||
      l.bairro.toLowerCase().includes(q) ||
      l.instagram.toLowerCase().includes(q)
    );
  }
  renderizar(lista);
}

function filtrarEstado(estado, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  estadoAtivo = estado;
  filtrar();

  const zooms = {
    'SP': {center:[-23.55,-46.63],zoom:11},
    'MG': {center:[-19.92,-43.94],zoom:12},
    'RJ': {center:[-22.91,-43.17],zoom:11},
    'PR': {center:[-25.43,-49.27],zoom:11},
    'DF': {center:[-15.80,-47.90],zoom:12},
    'RS': {center:[-30.03,-51.22],zoom:10},
    'BA': {center:[-12.97,-38.51],zoom:11},
    'outros': {center:[-10,-50],zoom:5},
    'todos': {center:[-15.78,-47.93],zoom:5}
  };
  const z = zooms[estado] || zooms['todos'];
  map.setView(z.center, z.zoom);
}

renderizar(lojas);
